<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  height: 100vh;
  background: #0b141a;
  color: white;
}

/* Sidebar */
.sidebar {
  width: 30%;
  background: #111b21;
  border-right: 1px solid #222;
}

.chat-item {
  display: flex;
  align-items: center;
  padding: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.chat-item:hover {
  background: #202c33;
}

.chat-item img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}

.chat-item div {
  margin-left: 10px;
}

/* Chat area */
.chat-container {
  width: 70%;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  background: #202c33;
  padding: 10px;
}

.header img {
  width: 40px;
  border-radius: 50%;
}

.header .info {
  margin-left: 10px;
}

.status {
  font-size: 12px;
  color: #00a884;
}

/* Messages */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.msg {
  padding: 8px 12px;
  margin: 5px;
  border-radius: 10px;
  max-width: 60%;
  position: relative;
  animation: fadeIn 0.2s ease;
}

.user {
  background: #005c4b;
  margin-left: auto;
}

.bot {
  background: #202c33;
}

.time {
  font-size: 10px;
  opacity: 0.6;
  margin-top: 2px;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(5px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Footer */
.footer {
  display: flex;
  padding: 10px;
  background: #202c33;
}

textarea {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  resize: none;
  height: 40px;
}

button {
  margin-left: 10px;
  padding: 10px;
  border-radius: 50%;
  border: none;
  background: #00a884;
  color: white;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar"></div>

<div class="chat-container">
  <div class="header">
    <img id="avatar">
    <div class="info">
      <div id="name"></div>
      <div class="status" id="status">online</div>
    </div>
  </div>

  <div id="chat"></div>

  <div class="footer">
    <textarea id="msg" placeholder="Type a message..." onkeydown="handleKey(event)"></textarea>
    <button onclick="send()">➤</button>
  </div>
</div>

<script>
let characters = {
  "Aisha": {img:"https://i.imgur.com/1X6qgYb.png"},
  "Riya": {img:"https://i.imgur.com/jQ9Z1Zm.png"},
  "Neha": {img:"https://i.imgur.com/8Km9tLL.png"},
  "Sara": {img:"https://i.imgur.com/3GvwNBf.png"}
};

let chats = {
  "Aisha": [],
  "Riya": [],
  "Neha": [],
  "Sara": []
};

let current = "Aisha";

/* Sidebar load */
let sidebar = document.getElementById("sidebar");
for (let name in characters){
  sidebar.innerHTML += `
    <div class="chat-item" onclick="switchChat('${name}')">
      <img src="${characters[name].img}">
      <div>${name}</div>
    </div>`;
}

/* Switch chat */
function switchChat(name){
  current = name;
  document.getElementById("name").innerText = name;
  document.getElementById("avatar").src = characters[name].img;
  loadChat();
}

/* Load messages */
function loadChat(){
  let chatDiv = document.getElementById("chat");
  chatDiv.innerHTML = "";

  chats[current].forEach(m => {
    chatDiv.innerHTML += messageHTML(m.text, m.type, m.time);
  });
}

/* Message template */
function messageHTML(text, type, time){
  return `
  <div class="msg ${type}">
    ${text}
    <div class="time">${time}</div>
  </div>`;
}

/* Time */
function getTime(){
  let d = new Date();
  return d.getHours()+":"+("0"+d.getMinutes()).slice(-2);
}

/* Enter send */
function handleKey(e){
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
}

/* Send */
async function send(){
  let input = document.getElementById("msg");
  let msg = input.value.trim();
  if(!msg) return;

  let chatDiv = document.getElementById("chat");

  let time = getTime();

  chats[current].push({type:"user", text:msg, time});
  chatDiv.innerHTML += messageHTML(msg,"user",time);
  input.value = "";

  let typing = document.createElement("div");
  typing.className = "msg bot";
  typing.innerText = "typing...";
  chatDiv.appendChild(typing);

  document.getElementById("status").innerText = "typing...";

  let res = await fetch("/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({message:msg, character:current})
  });

  let data = await res.json();

  typing.remove();
  document.getElementById("status").innerText = "online";

  let replyTime = getTime();

  chats[current].push({type:"bot", text:data.reply, time:replyTime});
  chatDiv.innerHTML += messageHTML(data.reply,"bot",replyTime);

  chatDiv.scrollTop = chatDiv.scrollHeight;
}

/* Init */
switchChat("Aisha");
</script>

</body>
</html>
